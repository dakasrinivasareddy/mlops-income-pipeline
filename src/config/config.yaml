project:
  name: ml-platform
  random_state: 42

data:
  raw_dir: data/raw
  processed_dir: data/processed
  train_file: train.csv
  test_file: test.csv
  target_column: income

model:
  type: xgboost
  params:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    eval_metric: logloss

artifacts:
  model_dir: artifacts
  model_file: model.joblib
  preprocessor_file: preprocessor.joblib
  metrics_file: metrics.json

mlflow:
  experiment_name: income_prediction_pipeline

api:
  host: 0.0.0.0
  port: 8000